<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Master - Presentation UI</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* 폰트 적용 */
        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        :root {
            --primary-gold: linear-gradient(to bottom, #ffd700, #ff8c00);
            --bg-color: radial-gradient(circle, #fdfdfd 0%, #e0e0e2 100%);
            --panel-bg: rgba(255, 255, 255, 0.95);
            --main-font: 'Presentation', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-color);
            height: 100vh; display: flex; flex-direction: column;
            font-family: var(--main-font); /* 선택하신 폰트 적용 */
            overflow: hidden;
            user-select: none;
        }

        /* --- 상단 프로필 --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 30px; width: 100%; box-sizing: border-box;
        }

        .profile-card {
            display: flex; align-items: center;
            background: var(--panel-bg);
            border: 3px solid #fff; border-radius: 50px;
            padding: 10px 30px; box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .currency { display: flex; gap: 15px; margin-left: 20px; }
        .currency-item {
            display: flex; align-items: center; gap: 8px;
            background: #f0f0f5; padding: 5px 18px; border-radius: 20px;
            font-size: 1.1rem; color: #333;
        }

        .settings-btn {
            width: 55px; height: 55px;
            background: var(--panel-bg); border-radius: 50%; border: 3px solid #fff;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .settings-btn:hover { transform: rotate(90deg); }

        /* --- 새소식 배너 --- */
        .news-container {
            position: absolute; top: 110px; right: 30px;
            width: 320px; background: var(--panel-bg);
            border-radius: 20px; border: 3px solid #fff;
            box-shadow: 0 12px 25px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .news-header {
            background: #4a90e2; color: white; padding: 12px 20px;
            font-size: 1.1rem; letter-spacing: 1px;
        }
        .news-content { padding: 20px; font-size: 1rem; color: #555; line-height: 1.5; }

        /* --- 하단 레이아웃 --- */
        .bottom-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 50px; box-sizing: border-box;
        }

        .left-menus { display: flex; gap: 25px; }

        .btn-small {
            width: 95px; height: 95px; background: #4da3ff; border: 5px solid #fff;
            border-radius: 25px; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 8px 0 #0052cc; transition: 0.1s;
        }
        .btn-small.gray { background: #9da3af; box-shadow: 0 8px 0 #646c7a; }
        .btn-small:active { transform: translateY(5px); box-shadow: 0 3px 0 #0052cc; }
        .btn-small span { font-size: 1.1rem; margin-top: 5px; }

        /* 🔥 거대 전투 버튼 (폰트 빨 제대로 받는 구간) */
        .btn-battle-huge {
            width: 550px; height: 140px; 
            background: var(--primary-gold);
            border: 8px solid #fff; border-radius: 100px;
            color: white; font-size: 58px; /* 폰트빨을 위해 더 크게! */
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; text-shadow: 0 4px 0 rgba(0,0,0,0.15);
            box-shadow: 0 15px 0 #cc6600, 0 25px 50px rgba(0,0,0,0.25);
            transition: 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: -1px;
        }

        .btn-battle-huge:hover { transform: scale(1.03) translateY(-8px); }
        .btn-battle-huge:active { 
            transform: translateY(12px); 
            box-shadow: 0 3px 0 #cc6600; 
        }

    </style>
</head>
<body>

    <header class="top-nav">
        <div class="profile-card">
            <div style="font-size: 1.6rem; color: #222;">주인님</div>
            <div class="currency">
                <div class="currency-item" style="color: #f39c12;">💰 12,500</div>
                <div class="currency-item" style="color: #3498db;">💎 320</div>
            </div>
        </div>
        <button class="settings-btn">
            <i class="material-icons" style="font-size: 35px; color: #666;">settings</i>
        </button>
    </header>

    <div class="news-container">
        <div class="news-header">NEWS</div>
        <div class="news-content">새로운 몬스터 드래곤 등장!<br>지금 바로 상점에서 확인하세요.</div>
    </div>

    <div class="bottom-container">
        <div class="left-menus">
            <div class="btn-small">
                <i class="material-icons" style="font-size: 40px;">shopping_bag</i>
                <span>상점</span>
            </div>
            <div class="btn-small gray">
                <i class="material-icons" style="font-size: 40px;">style</i>
                <span>인벤토리</span>
            </div>
        </div>

        <div class="btn-battle-huge">
            전투 시작 !
        </div>
    </div>

</body>
</html>
