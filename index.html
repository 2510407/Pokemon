<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Master - Home v3.1</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        :root {
            --bg-color: #f7fafe;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --glass-blur: blur(8px);
            --border-style: 1px solid rgba(255, 255, 255, 0.5);
            --soft-shadow: 0 10px 40px rgba(0,0,0,0.06); 
            --main-font: 'Presentation', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            height: 100vh; display: flex; flex-direction: column;
            font-family: var(--main-font);
            overflow: hidden; user-select: none;
        }

        /* --- 공통 카드 스타일 --- */
        .card-panel {
            background-color: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border: var(--border-style);
            border-radius: 20px;
            box-shadow: var(--soft-shadow);
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
        }
        .card-panel:active { transform: scale(0.96); }

        /* --- 상단 레이아웃 --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 25px; width: 100%; box-sizing: border-box;
        }

        .profile-card {
            flex-direction: row; gap: 15px; padding: 8px 25px; border-radius: 50px;
        }

        /* 🔥 복구된 설정 버튼 스타일 */
        .settings-btn {
            width: 55px; height: 55px; border-radius: 50%;
        }
        .settings-btn i { color: #666; font-size: 30px; }
        .settings-btn:hover i { transform: rotate(90deg); transition: 0.3s; }

        /* --- 상단 우측 그룹 (설정 + 새소식) --- */
        .top-right-group {
            display: flex; flex-direction: column; align-items: flex-end; gap: 15px;
        }

        .news-card {
            width: 320px; padding: 15px; align-items: flex-start; border-radius: 15px;
        }
        .news-header { font-size: 1.1rem; color: #333; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .news-content { font-size: 0.9rem; color: #666; font-weight: 400; line-height: 1.4; }

        /* --- 중앙 & 하단 레이아웃 --- */
        .main-stage { flex: 1; display: flex; justify-content: center; align-items: center; }
        .monster-spot { width: 300px; height: 100px; background: rgba(0,0,0,0.03); border-radius: 50%; filter: blur(15px); }

        .bottom-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 40px; box-sizing: border-box;
        }

        .left-menus { display: flex; gap: 15px; }
        .btn-small { width: 90px; height: 90px; }
        .btn-small i { font-size: 35px; color: #555; margin-bottom: 3px; }
        .btn-small span { font-size: 1.1rem; color: #444; }

        .btn-battle-huge {
            width: 500px; height: 120px; 
            background: linear-gradient(to bottom, #ffd700, #ff8c00);
            border: 6px solid #fff; border-radius: 60px;
            color: white; font-size: 50px; font-weight: 900;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; text-shadow: 0 3px 6px rgba(0,0,0,0.2);
            box-shadow: 0 10px 0 #cc7000, 0 20px 40px rgba(0,0,0,0.15);
            transition: all 0.1s;
        }
        .btn-battle-huge:active { transform: translateY(8px); box-shadow: 0 2px 0 #cc7000; }

    </style>
</head>
<body>

    <header class="top-nav">
        <div class="card-panel profile-card">
            <div style="font-size: 1.4rem; color: #333;">주인님</div>
            <div style="display: flex; gap: 12px;">
                <span style="color: #555;">💰 12,500</span>
                <span style="color: #555;">💎 320</span>
            </div>
        </div>

        <div class="top-right-group">
            <div class="card-panel settings-btn">
                <i class="material-icons">settings</i>
            </div>
            <div class="card-panel news-card">
                <div class="news-header"><i class="material-icons" style="font-size: 18px;">notifications</i> 새소식</div>
                <div class="news-content">새로운 몬스터 드래곤 등장!<br>지금 바로 상점에서 확인하세요.</div>
            </div>
        </div>
    </header>

    <main class="main-stage">
        <div class="monster-spot"></div>
    </main>

    <div class="bottom-container">
        <div class="left-menus">
            <div class="card-panel btn-small">
                <i class="material-icons">shopping_bag</i>
                <span>상점</span>
            </div>
            <div class="card-panel btn-small">
                <i class="material-icons">style</i>
                <span>덱</span>
            </div>
        </div>
        <div class="btn-battle-huge">전투 시작 !</div>
    </div>

</body>
</html>
