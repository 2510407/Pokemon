<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Master - All Code</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #fdfdfd 0%, #e0e0e2 100%);
            height: 100vh; display: flex; flex-direction: column;
            font-family: 'Malgun Gothic', sans-serif; overflow: hidden;
        }

        /* --- 상단 레이아웃 --- */
        .top-nav {
            display: flex; justify-content: space-between; padding: 20px;
        }

        .profile-card {
            display: flex; align-items: center; background: white;
            padding: 10px 25px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 하단 레이아웃 (핵심 수정 부분) --- */
        .bottom-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 40px; box-sizing: border-box;
        }

        .left-menus { display: flex; gap: 20px; }

        /* 일반 버튼 스타일 */
        .btn-circle {
            width: 80px; height: 80px; background: #4da3ff; border: 4px solid #fff;
            border-radius: 20px; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            box-shadow: 0 6px 0 #0052cc; transition: 0.1s;
        }
        .btn-circle:active { transform: translateY(4px); box-shadow: 0 2px 0 #0052cc; }

        /* 🔥 거대한 전투 시작 버튼 (기존의 3배) */
        .btn-battle-huge {
            width: 450px; height: 120px; /* 크기 대폭 확장 */
            background: linear-gradient(to bottom, #ffcc00, #ff8800);
            border: 6px solid #fff; border-radius: 60px;
            color: white; font-size: 42px; font-weight: 900;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; text-shadow: 0 3px 6px rgba(0,0,0,0.3);
            box-shadow: 0 12px 0 #cc6600, 0 20px 30px rgba(0,0,0,0.2);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-battle-huge:hover { transform: scale(1.02) translateY(-5px); }
        .btn-battle-huge:active { 
            transform: translateY(10px); 
            box-shadow: 0 2px 0 #cc6600; 
        }

        /* 버튼 내부 아이콘/텍스트 간격 */
        .btn-battle-huge i { font-size: 50px; margin-right: 15px; }

    </style>
</head>
<body>

    <header class="top-nav">
        <div class="profile-card">
            <div style="font-weight: 900;">주인님</div>
            <div style="margin-left: 15px; color: #f39c12;">💰 12,500</div>
        </div>
    </header>

    <div class="bottom-container">
        <div class="left-menus">
            <div class="btn-circle">
                <i class="material-icons">shopping_bag</i>
                <span style="font-size: 12px;">상점</span>
            </div>
            <div class="btn-circle" style="background: #9b9b9b; box-shadow: 0 6px 0 #555;">
                <i class="material-icons">style</i>
                <span style="font-size: 12px;">덱</span>
            </div>
        </div>

        <div class="btn-battle-huge">
            <i class="material-icons">crossed_swords</i>
            <span>전투 시작</span>
        </div>
    </div>

</body>
</html>
