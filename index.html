<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Master - Home v3.2</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-8ExtraBold.woff2') format('woff2');
            font-weight: 800;
            font-display: swap;
        }

        :root {
            --bg-color: #f7fafe;
            --panel-bg: rgba(255, 255, 255, 0.95); /* 배경을 조금 더 불투명하게 해서 대비 강화 */
            --glass-blur: blur(10px);
            --border-style: 1px solid rgba(255, 255, 255, 0.8);
            /* 🔥 그림자 강화: 더 어둡고(0.12), 더 멀리(50px) 퍼지도록 수정 */
            --strong-shadow: 0 15px 45px rgba(0, 0, 0, 0.12), 0 5px 15px rgba(0, 0, 0, 0.05); 
            --main-font: 'Presentation', sans-serif;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            height: 100vh; display: flex; flex-direction: column;
            font-family: var(--main-font);
            overflow: hidden; user-select: none;
        }

        /* --- 공통 카드 스타일 (그림자 강화 적용) --- */
        .card-panel {
            background-color: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border: var(--border-style);
            border-radius: 22px;
            box-shadow: var(--strong-shadow); /* 강화된 그림자 */
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
        }
        
        /* 호버 시 살짝 더 떠오르는 효과 */
        .card-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 55px rgba(0, 0, 0, 0.15);
        }
        
        .card-panel:active { transform: scale(0.95); }

        /* --- 레이아웃 --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 30px; width: 100%; box-sizing: border-box;
        }

        .profile-card {
            flex-direction: row; gap: 18px; padding: 12px 30px; border-radius: 60px;
        }

        .settings-btn {
            width: 60px; height: 60px; border-radius: 50%;
        }
        .settings-btn i { color: #555; font-size: 32px; }

        .top-right-group {
            display: flex; flex-direction: column; align-items: flex-end; gap: 15px;
        }

        .news-card {
            width: 340px; padding: 20px; align-items: flex-start; border-radius: 20px;
        }
        .news-header { font-size: 1.2rem; color: #222; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .news-content { font-size: 1rem; color: #555; font-weight: 400; line-height: 1.5; }

        .main-stage { flex: 1; display: flex; justify-content: center; align-items: center; }
        .monster-spot { 
            width: 350px; height: 120px; 
            background: rgba(0,0,0,0.04); 
            border-radius: 50%; 
            filter: blur(20px); 
        }

        .bottom-container {
            position: absolute; bottom: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 50px; box-sizing: border-box;
        }

        .left-menus { display: flex; gap: 20px; }
        .btn-small { width: 100px; height: 100px; }
        .btn-small i { font-size: 40px; color: #444; margin-bottom: 5px; }
        .btn-small span { font-size: 1.2rem; color: #333; }

        /* 🔥 거대 전투 버튼: 그림자 효과를 레이어 형태로 쌓아서 더 묵직하게 */
        .btn-battle-huge {
            width: 520px; height: 130px; 
            background: linear-gradient(to bottom, #ffd700, #ff8c00);
            border: 6px solid #fff; border-radius: 65px;
            color: white; font-size: 52px; font-weight: 900;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; 
            text-shadow: 0 4px 8px rgba(0,0,0,0.25);
            /* 버튼 하단 깊이감 표현(12px) + 바닥 그림자(45px) */
            box-shadow: 0 12px 0 #cc7000, 0 25px 50px rgba(0,0,0,0.3);
            transition: all 0.1s ease-out;
            letter-spacing: -1px;
        }

        .btn-battle-huge:hover { transform: translateY(-3px); }
        .btn-battle-huge:active { 
            transform: translateY(10px); 
            box-shadow: 0 2px 0 #cc7000, 0 10px 20px rgba(0,0,0,0.2); 
        }

    </style>
</head>
<body>

    <header class="top-nav">
        <div class="card-panel profile-card">
            <div style="font-size: 1.6rem; color: #111;">주인님</div>
            <div style="display: flex; gap: 15px; font-size: 1.2rem;">
                <span style="color: #d35400;">💰 12,500</span>
                <span style="color: #2980b9;">💎 320</span>
            </div>
        </div>

        <div class="top-right-group">
            <div class="card-panel settings-btn">
                <i class="material-icons">settings</i>
            </div>
            <div class="card-panel news-card">
                <div class="news-header"><i class="material-icons" style="font-size: 20px; color: #f39c12;">notifications</i> 새소식</div>
                <div class="news-content">새로운 몬스터 드래곤 등장!<br>지금 바로 상점에서 확인하세요.</div>
            </div>
        </div>
    </header>

    <main class="main-stage">
        <div class="monster-spot"></div>
    </main>

    <div class="bottom-container">
        <div class="left-menus">
            <div class="card-panel btn-small">
                <i class="material-icons">shopping_bag</i>
                <span>상점</span>
            </div>
            <div class="card-panel btn-small">
                <i class="material-icons">style</i>
                <span>덱</span>
            </div>
        </div>
        <div class="btn-battle-huge">전투 시작 !</div>
    </div>

</body>
</html>
