<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Master - Online v3.8.2</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

       const firebaseConfig = {
  apiKey: "AIzaSyDb2Fh9FHOe7Is0BAoaVDojFJvs8XUgJcg", // 이제 유효한 키입니다!
  authDomain: "pokemon-fa8e3.firebaseapp.com",
  projectId: "pokemon-fa8e3",
  storageBucket: "pokemon-fa8e3.firebasestorage.app",
  messagingSenderId: "709221600685",
  appId: "1:709221600685:web:1d7d369cfd25b679d2e524",
  measurementId: "G-J8EE2SP3K8"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM 요소들
        const profileCard = document.getElementById('profile-card');
        const loginSection = document.getElementById('login-section');
        const userNameDisp = document.getElementById('user-name');
        const timerDisp = document.getElementById('nickname-timer');
        const goldDisp = document.getElementById('gold-count');
        const gemDisp = document.getElementById('gem-count');
        const onlineDot = document.getElementById('online-dot');
        const shopScreen = document.getElementById('shop-screen');

        // --- 유틸리티 함수 ---
        function getRemainingTime(lastChanged) {
            if (!lastChanged || !lastChanged.toDate) return 0;
            const now = new Date();
            const diff = 86400000 - (now - lastChanged.toDate()); 
            return diff > 0 ? diff : 0;
        }

        // --- 로그인/회원가입 로직 ---
        window.handleAuth = async (mode) => {
            const email = document.getElementById('email-input').value;
            const pw = document.getElementById('pw-input').value;
            if(!email || !pw) return alert("이메일과 비밀번호를 입력하세요!");
            try {
                if(mode === 'signup') {
                    await createUserWithEmailAndPassword(auth, email, pw);
                    alert("가입을 축하합니다!");
                } else {
                    await signInWithEmailAndPassword(auth, email, pw);
                }
            } catch (error) {
                alert("오류 발생: " + error.message);
            }
        };

        // --- 상점 로직 ---
        window.openShop = () => { shopScreen.style.display = 'block'; };
        window.closeShop = () => { shopScreen.style.display = 'none'; };

        window.buyPack = async (price) => {
            const user = auth.currentUser;
            if (!user) return alert("로그인이 필요합니다!");

            const userRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(userRef);
            const userData = docSnap.data();

            if (userData.gem < price) return alert("다이아몬드가 부족합니다!");

            await updateDoc(userRef, { gem: userData.gem - price });
            alert("팩 구매 완료! 곧 카드가 추가됩니다.");
        };

        // --- 닉네임 변경 ---
        async function changeNickname(user) {
            const userRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(userRef);
            const data = docSnap.data();
            const remaining = getRemainingTime(data.lastNicknameChange);
            if (remaining > 0) {
                alert(`쿨타임 중! ${Math.floor(remaining/3600000)}시간 후에 가능합니다.`);
                return;
            }
            const newName = prompt("새 닉네임 (최대 8자):");
            if (newName && newName.trim().length > 0 && newName.length <= 8) {
                await updateDoc(userRef, { name: newName.trim(), lastNicknameChange: new Date() });
            }
        }

        // --- 인증 상태 감시 ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loginSection.style.display = 'none';
                profileCard.style.display = 'flex';
                onlineDot.style.background = "#4caf50";
                profileCard.onclick = () => changeNickname(user);

                const userRef = doc(db, "users", user.uid);
                onSnapshot(userRef, async (docSnap) => {
                    if (!docSnap.exists()) {
                        await setDoc(userRef, {
                            name: user.email.split('@')[0],
                            gold: 10000, gem: 100, lv: 1,
                            inventory: ["card_001"],
                            lastNicknameChange: null
                        });
                    } else {
                        const data = docSnap.data();
                        userNameDisp.innerText = data.name;
                        goldDisp.innerText = data.gold.toLocaleString();
                        gemDisp.innerText = data.gem.toLocaleString();
                        const remaining = getRemainingTime(data.lastNicknameChange);
                        timerDisp.style.display = remaining > 0 ? 'block' : 'none';
                        if(remaining > 0) timerDisp.innerText = `${Math.floor(remaining/3600000)}h 후 변경가능`;
                    }
                });
            } else {
                loginSection.style.display = 'flex';
                profileCard.style.display = 'none';
                onlineDot.style.background = "#bbb";
            }
        });
    </script>

    <style>
        @font-face {
            font-family: 'Presentation';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2404@1.0/Freesentation-8ExtraBold.woff2') format('woff2');
            font-weight: 800; font-display: swap;
        }

        :root {
            --bg-color: #f7fafe;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --glass-blur: blur(10px);
            --strong-shadow: 0 15px 45px rgba(0, 0, 0, 0.12);
            --main-font: 'Presentation', sans-serif;
            --battle-blue: #81d4fa; 
        }

        body {
            margin: 0; background-color: var(--bg-color);
            height: 100vh; display: flex; flex-direction: column;
            font-family: var(--main-font); overflow: hidden; user-select: none;
        }

        .card-panel {
            background-color: var(--panel-bg); backdrop-filter: var(--glass-blur);
            border-radius: 22px; box-shadow: var(--strong-shadow);
            cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .card-panel:hover { transform: translateY(-5px); }

        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; padding: 30px; width: 100%; box-sizing: border-box; z-index: 10; }
        .login-box { flex-direction: row; gap: 10px; padding: 10px 20px; border-radius: 50px; }
        .login-box input { border: none; outline: none; background: rgba(0,0,0,0.05); padding: 8px 15px; border-radius: 20px; font-family: var(--main-font); width: 120px; }
        .auth-btn { background: var(--battle-blue); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .profile-card { flex-direction: row; gap: 15px; padding: 12px 30px; border-radius: 60px; position: relative; display: none; }
        .online-dot { width: 12px; height: 12px; background: #bbb; border-radius: 50%; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); border: 2px solid white; }

        .news-card { width: 340px; padding: 20px; align-items: flex-start; border-radius: 20px; cursor: default; }

        .main-stage { flex: 1; display: flex; justify-content: center; align-items: center; }
        .monster-spot { width: 350px; height: 120px; background: rgba(0,0,0,0.04); border-radius: 50%; filter: blur(20px); }

        .bottom-container { position: absolute; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: flex-end; padding: 50px; box-sizing: border-box; }
        .btn-small { width: 100px; height: 100px; margin-right: 15px; }
        .btn-small i { font-size: 40px; color: #444; }

        .btn-battle-huge {
            width: 520px; height: 130px; background-color: var(--battle-blue); 
            border: 8px solid #ffffff; border-radius: 70px;
            color: white; font-size: 58px; font-weight: 900;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; text-shadow: 2px 2px 0 #000;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15); transition: all 0.2s;
        }

        /* --- 상점 스타일 --- */
        #shop-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 1000; padding: 50px; box-sizing: border-box;
        }
        .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .pack-card { padding: 30px; height: 400px; justify-content: space-around; }
        .close-btn { width: 60px; height: 60px; border-radius: 50%; font-size: 1.5rem; background: #fff; }
    </style>
</head>
<body>

    <section id="shop-screen">
        <div class="shop-header">
            <h1 style="font-size: 3rem; margin: 0;">포켓몬 카드 상점</h1>
            <div class="card-panel close-btn" onclick="closeShop()">✕</div>
        </div>
        <div class="shop-grid">
            <div class="card-panel pack-card">
                <div style="font-size: 5rem;">📦</div>
                <div style="text-align: center;">
                    <h2 style="margin: 10px 0;">베이직 팩</h2>
                    <p style="color: #777;">무작위 몬스터 카드 5장</p>
                </div>
                <div class="btn-battle-huge" style="width: 220px; height: 70px; font-size: 1.8rem; border-width: 5px;" onclick="buyPack(100)">
                    💎 100
                </div>
            </div>
        </div>
    </section>

    <header class="top-nav">
        <div class="card-panel login-box" id="login-section">
            <input type="email" id="email-input" placeholder="이메일">
            <input type="password" id="pw-input" placeholder="비밀번호">
            <button class="auth-btn" onclick="handleAuth('login')">로그인</button>
            <button class="auth-btn" style="background:#aaa;" onclick="handleAuth('signup')">가입</button>
        </div>

        <div class="card-panel profile-card" id="profile-card">
            <div id="online-dot" class="online-dot"></div>
            <div style="display: flex; flex-direction: column; margin-left: 10px;">
                <div id="user-name" style="font-size: 1.6rem; color: #111;">유저명</div>
                <div id="nickname-timer" style="font-size: 0.75rem; color: #ff5252; display: none;"></div>
            </div>
            <div style="display: flex; gap: 15px; font-size: 1.2rem; margin-left: 10px;">
                <span style="color: #d35400;">💰 <span id="gold-count">0</span></span>
                <span style="color: #2980b9;">💎 <span id="gem-count">0</span></span>
            </div>
        </div>

        <div class="top-right-group">
            <div class="card-panel news-card">
                <div style="font-size: 1.2rem; margin-bottom: 8px;"><i class="material-icons" style="vertical-align: middle; color: #f39c12;">notifications</i> 새소식</div>
                <div style="font-size: 1rem; color: #555;">상점 오픈! 카드팩을 구매해 보세요.</div>
            </div>
        </div>
    </header>

    <main class="main-stage">
        <div class="monster-spot"></div>
    </main>

    <div class="bottom-container">
        <div style="display: flex;">
            <div class="card-panel btn-small" onclick="openShop()">
                <i class="material-icons">shopping_bag</i>
                <span style="font-size: 1.2rem;">상점</span>
            </div>
            <div class="card-panel btn-small">
                <i class="material-icons">style</i>
                <span style="font-size: 1.2rem;">덱</span>
            </div>
        </div>
        <div class="btn-battle-huge">배틀 !</div>
    </div>

</body>
</html>
